<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAKU//SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Noto+Sans+JP:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="system.css">
</head>

<body>

<div class="frame"></div>

<main class="system">

  <!-- 左 -->
  <section class="hero">

    <h1>KAKU//SYSTEM</h1>
    <p class="kana">かくにんシステム</p>

    <div class="copy">
      <p>KAKU//SYSTEMへようこそ。</p>
      <p>ここは、かくにんとあなたを繋ぐために構築された拡張領域。</p>
      <p>あなたの行動はデータとなり、ポイントとして蓄積され、</p>
      <p>新たな体験へと変換されていきます。</p>
      <p>観測するだけの存在から、接続し、干渉する存在へ。</p>
      <p>——このシステムに、アクセスしますか？</p>
    </div>

    <div class="hero-btns">
      <a class="btn ghost">Twitchでログイン</a>
      <a class="btn primary">KAKU//SYSTEMへ</a>
    </div>

  </section>

  <!-- 右 -->
  <aside class="login">

    <h2>LOGIN</h2>
    <p class="sub">KAKU//SYSTEMへログイン</p>

    <button class="login-btn discord">Discordでログイン</button>
    <button class="login-btn twitch">Twitchでログイン</button>

    <div class="or">or</div>

    <input type="text" placeholder="メールアドレス">
    <input type="password" placeholder="パスワード">

    <button class="login-main">ログイン</button>

  </aside>

</main>

<!-- 下パネル -->
<section class="dashboard">

  <div class="card">STREAM STATUS</div>
  <div class="card">FOLLOWERS</div>
  <div class="card">KLYX POINT</div>
  <div class="card">SCHEDULE</div>
  <div class="card">SYSTEM MENU</div>

</section>

</body>
</html>
